name: Deploy Application Registry

permissions:
  actions: read
  contents: read
  id-token: write

on:
  workflow_call:

concurrency:
  group: application-registry-production
  cancel-in-progress: false

jobs:
  deploy-registry-api-server:
    name: Publish and register self-hosted registry API
    if: ${{ vars.CV_NOMAD_API_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/cv-application-registry-api
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push immutable API image
        id: image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/application-registry-api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Install Nomad Pack
        run: |
          version=0.3.0
          archive="nomad-pack_${version}_linux_amd64.zip"
          curl -fsSL "https://releases.hashicorp.com/nomad-pack/${version}/${archive}" -o "$archive"
          unzip -q "$archive" -d /tmp/nomad-pack
          sudo install /tmp/nomad-pack/nomad-pack /usr/local/bin/nomad-pack

      - name: Register disabled-by-default API service
        env:
          API_BFF_ENABLED: ${{ vars.CV_REGISTRY_BFF_ENABLED || 'false' }}
          API_ENABLED: ${{ vars.CV_REGISTRY_NOMAD_ENABLED || 'false' }}
          API_IMAGE_DIGEST: ${{ steps.image.outputs.digest }}
          API_SUBDOMAIN: ${{ vars.CV_REGISTRY_ORIGIN_SUBDOMAIN || 'registry-origin' }}
          NOMAD_ADDR: ${{ secrets.NOMAD_ADDR }}
          NOMAD_TOKEN: ${{ secrets.NOMAD_TOKEN }}
          REGISTRY_PULL_TOKEN: ${{ secrets.REGISTRY_PULL_TOKEN }}
        run: |
          nomad-pack run nomad/packs/application-registry-api \
            --parser-v1 \
            --var "docker_image=${REGISTRY}/${IMAGE_NAME}@${API_IMAGE_DIGEST}" \
            --var "docker_image_username=${{ github.repository_owner }}" \
            --var "docker_image_password=${REGISTRY_PULL_TOKEN}" \
            --var "enabled=${API_ENABLED}" \
            --var "bff_enabled=${API_BFF_ENABLED}" \
            --var "traefik_subdomain=${API_SUBDOMAIN}"

  deploy-listing-check-runner:
    name: Publish and register listing-check runner
    if: ${{ vars.CV_NOMAD_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/cv-listing-check-runner
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push immutable runner image
        id: image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/application-registry-listing-check-runner/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Install Nomad Pack
        run: |
          version=0.3.0
          archive="nomad-pack_${version}_linux_amd64.zip"
          curl -fsSL "https://releases.hashicorp.com/nomad-pack/${version}/${archive}" -o "$archive"
          unzip -q "$archive" -d /tmp/nomad-pack
          sudo install /tmp/nomad-pack/nomad-pack /usr/local/bin/nomad-pack

      - name: Register disabled-by-default periodic job
        env:
          NOMAD_ADDR: ${{ secrets.NOMAD_ADDR }}
          NOMAD_TOKEN: ${{ secrets.NOMAD_TOKEN }}
          REGISTRY_PULL_TOKEN: ${{ secrets.REGISTRY_PULL_TOKEN }}
          RUNNER_ENABLED: ${{ vars.CV_LISTING_CHECKS_ENABLED || 'false' }}
          RUNNER_IMAGE_DIGEST: ${{ steps.image.outputs.digest }}
        run: |
          nomad-pack run nomad/packs/application-registry-listing-check-runner \
            --parser-v1 \
            --var "docker_image=${REGISTRY}/${IMAGE_NAME}@${RUNNER_IMAGE_DIGEST}" \
            --var "docker_image_username=${{ github.repository_owner }}" \
            --var "docker_image_password=${REGISTRY_PULL_TOKEN}" \
            --var "enabled=${RUNNER_ENABLED}"

  deploy-self-hosted-pdf:
    name: Publish and register PDF event worker
    if: ${{ vars.CV_NOMAD_PDF_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository_owner }}/application-registry-pdf-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push immutable PDF worker image
        id: image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/application-registry-pdf-worker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Install Nomad Pack
        run: |
          version=0.3.0
          archive="nomad-pack_${version}_linux_amd64.zip"
          curl -fsSL "https://releases.hashicorp.com/nomad-pack/${version}/${archive}" -o "$archive"
          unzip -q "$archive" -d /tmp/nomad-pack
          sudo install /tmp/nomad-pack/nomad-pack /usr/local/bin/nomad-pack

      - name: Register disabled-by-default PDF worker
        env:
          NOMAD_ADDR: ${{ secrets.NOMAD_ADDR }}
          NOMAD_TOKEN: ${{ secrets.NOMAD_TOKEN }}
          REGISTRY_PULL_TOKEN: ${{ secrets.REGISTRY_PULL_TOKEN }}
          WORKER_ENABLED: ${{ vars.CV_PDF_WORKER_ENABLED || 'false' }}
          WORKER_IMAGE_DIGEST: ${{ steps.image.outputs.digest }}
        run: |
          nomad-pack run nomad/packs/application-registry-pdf-worker \
            --parser-v1 \
            --var "docker_image=${REGISTRY}/${IMAGE_NAME}@${WORKER_IMAGE_DIGEST}" \
            --var "docker_image_username=${{ github.repository_owner }}" \
            --var "docker_image_password=${REGISTRY_PULL_TOKEN}" \
            --var "enabled=${WORKER_ENABLED}"
