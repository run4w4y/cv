name: Deploy Application Registry

permissions:
  actions: read
  contents: read
  id-token: write

on:
  workflow_call:

concurrency:
  group: application-registry-production
  cancel-in-progress: false

env:
  INFISICAL_ENV: ${{ vars.INFISICAL_ENV || 'prod' }}
  INFISICAL_HOST: ${{ vars.INFISICAL_HOST || 'https://app.infisical.com' }}

jobs:
  deploy-application-registry:
    name: Migrate and deploy registry Worker
    runs-on: ubuntu-latest
    environment: production
    permissions:
      actions: read
      contents: read
      deployments: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Fetch Infisical secrets
        if: ${{ !env.ACT }}
        uses: ./.github/actions/fetch-infisical
        with:
          identity-id: ${{ secrets.INFISICAL_IDENTITY_ID }}
          project-slug: ${{ secrets.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ env.INFISICAL_ENV }}
          host: ${{ env.INFISICAL_HOST }}

      - name: Set up workspace runtime
        uses: ./.github/actions/setup-runtime

      - name: Validate production registry configuration
        run: |
          missing=()
          for name in \
            APPLICATION_REGISTRY_DB_ID \
            APPLICATION_REGISTRY_DB_NAME \
            APPLICATION_REGISTRY_WORKER_NAME \
            CHATGPT_SESSIONS_KV_ID \
            CHATGPT_SESSION_SECRET \
            CLOUDFLARE_ACCOUNT_ID \
            CLOUDFLARE_ANALYTICS_API_TOKEN \
            CLOUDFLARE_API_TOKEN \
            CLOUDFLARE_ZONE_ID \
            CV_WEB_HOST \
            CV_OBJECTS_BUCKET_NAME \
            CV_PUBLIC_WORKER_NAME \
            CV_REVALIDATION_SECRET \
            FACTS_R2_BUCKET \
            REGISTRY_API_URL \
            REGISTRY_API_TOKEN \
            VITE_FACTS_R2_ACCESS_KEY_ID \
            VITE_FACTS_R2_ACCOUNT_ID \
            VITE_FACTS_R2_BUCKET \
            VITE_FACTS_R2_SECRET_ACCESS_KEY
          do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf '::error title=Missing production registry configuration::Missing: %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Configure direct facts-read CORS
        run: |
          management_origin="${REGISTRY_API_URL%/}"
          if [[ ! "$management_origin" =~ ^https://[^/?#]+$ ]]; then
            echo '::error title=Invalid management origin::REGISTRY_API_URL must be an HTTPS origin without a path, query, or fragment.'
            exit 1
          fi

          jq -n --arg origin "$management_origin" '{
            rules: [{
              allowed: {
                origins: [$origin, "http://localhost:4300"],
                methods: ["GET", "HEAD"],
                headers: [
                  "authorization",
                  "content-type",
                  "x-amz-content-sha256",
                  "x-amz-date",
                  "x-amz-security-token"
                ]
              },
              exposeHeaders: ["cache-control", "content-length", "content-type", "etag"],
              maxAgeSeconds: 3600
            }]
          }' > "$RUNNER_TEMP/facts-r2-cors.json"

          node node_modules/wrangler/bin/wrangler.js r2 bucket cors set \
            "$FACTS_R2_BUCKET" \
            --file "$RUNNER_TEMP/facts-r2-cors.json" \
            --force

      - name: Build management application
        run: |
          if [[ "$CV_WEB_HOST" == *://* || "$CV_WEB_HOST" == */* ]]; then
            echo '::error title=Invalid public CV hostname::CV_WEB_HOST must be a hostname without a scheme or path.'
            exit 1
          fi
          export VITE_CV_PUBLIC_BASE_URL="https://${CV_WEB_HOST}/c"
          ./node_modules/.bin/nx run application-registry-management:build --skip-nx-cache

      - name: Build registry and PDF Workers
        run: |
          ./node_modules/.bin/nx run cv-pdf-worker:build --skip-nx-cache
          ./node_modules/.bin/nx run application-registry-api:build --skip-nx-cache

      - name: Generate production Wrangler configs
        env:
          APPLICATION_REGISTRY_COMPATIBILITY_DATE: ${{ vars.APPLICATION_REGISTRY_COMPATIBILITY_DATE }}
        run: |
          bun apps/cv-pdf-worker/scripts/write-wrangler-config.ts apps/cv-pdf-worker/wrangler.deploy.jsonc
          bun apps/application-registry-api/scripts/write-wrangler-config.ts apps/application-registry-api/wrangler.deploy.jsonc

      - name: Ensure PDF queues exist
        run: |
          PDF_QUEUE="${CV_PDF_QUEUE_NAME:-cv-pdf-generation}"
          PDF_DLQ="${CV_PDF_DLQ_NAME:-cv-pdf-generation-dead-letter}"
          node node_modules/wrangler/bin/wrangler.js queues info "$PDF_QUEUE" >/dev/null 2>&1 || node node_modules/wrangler/bin/wrangler.js queues create "$PDF_QUEUE"
          node node_modules/wrangler/bin/wrangler.js queues info "$PDF_DLQ" >/dev/null 2>&1 || node node_modules/wrangler/bin/wrangler.js queues create "$PDF_DLQ"

      - name: Apply D1 migrations
        run: node ../../node_modules/wrangler/bin/wrangler.js d1 migrations apply APPLICATION_REGISTRY_DB --remote --config wrangler.deploy.jsonc
        working-directory: apps/application-registry-api

      - name: Deploy PDF Queue Worker
        run: node ../../node_modules/wrangler/bin/wrangler.js deploy --config wrangler.deploy.jsonc
        working-directory: apps/cv-pdf-worker

      - name: Deploy registry Worker with bearer secret
        run: bun scripts/deploy.ts wrangler.deploy.jsonc
        working-directory: apps/application-registry-api
