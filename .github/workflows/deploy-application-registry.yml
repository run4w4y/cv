name: Deploy Application Registry

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      api_image_digest:
        description: Immutable registry API image digest.
        required: true
        type: string
      web_image_digest:
        description: Immutable registry management web image digest.
        required: true
        type: string
      listing_check_runner_image_digest:
        description: Immutable listing-check runner image digest.
        required: true
        type: string
      pdf_worker_image_digest:
        description: Immutable PDF worker image digest.
        required: true
        type: string

concurrency:
  group: application-registry-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  deploy-registry-api-server:
    name: Register registry API
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      IMAGE_NAME: ${{ github.repository_owner }}/cv-application-registry-api
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nomad Pack
        run: |
          version=0.3.0
          archive="nomad-pack_${version}_linux_amd64.zip"
          curl -fsSL "https://releases.hashicorp.com/nomad-pack/${version}/${archive}" -o "$archive"
          unzip -q "$archive" -d /tmp/nomad-pack
          sudo install /tmp/nomad-pack/nomad-pack /usr/local/bin/nomad-pack

      - name: Register registry API service
        env:
          API_CORS_ALLOWED_ORIGINS: ${{ vars.CV_REGISTRY_WEB_ORIGIN || 'https://cv-registry.4w4y.run' }}
          API_ENABLED: "true"
          API_IMAGE_DIGEST: ${{ inputs.api_image_digest }}
          API_SUBDOMAIN: ${{ vars.CV_API_SUBDOMAIN || 'cv-api' }}
          NOMAD_ADDR: ${{ secrets.NOMAD_ADDR }}
          NOMAD_TOKEN: ${{ secrets.NOMAD_TOKEN }}
        run: |
          nomad-pack run nomad/packs/application-registry-api \
            --parser-v1 \
            --var "docker_image=${REGISTRY}/${IMAGE_NAME}@${API_IMAGE_DIGEST}" \
            --var "enabled=${API_ENABLED}" \
            --var "cors_allowed_origins=${API_CORS_ALLOWED_ORIGINS}" \
            --var "traefik_subdomain=${API_SUBDOMAIN}"

  deploy-registry-web:
    name: Register registry management web
    needs: deploy-registry-api-server
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      IMAGE_NAME: ${{ github.repository_owner }}/cv-application-registry-web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nomad Pack
        run: |
          version=0.3.0
          archive="nomad-pack_${version}_linux_amd64.zip"
          curl -fsSL "https://releases.hashicorp.com/nomad-pack/${version}/${archive}" -o "$archive"
          unzip -q "$archive" -d /tmp/nomad-pack
          sudo install /tmp/nomad-pack/nomad-pack /usr/local/bin/nomad-pack

      - name: Register registry management web service
        env:
          NOMAD_ADDR: ${{ secrets.NOMAD_ADDR }}
          NOMAD_TOKEN: ${{ secrets.NOMAD_TOKEN }}
          WEB_ENABLED: "true"
          WEB_IMAGE_DIGEST: ${{ inputs.web_image_digest }}
          WEB_SUBDOMAIN: ${{ vars.CV_REGISTRY_WEB_SUBDOMAIN || 'cv-registry' }}
        run: |
          nomad-pack run nomad/packs/application-registry-web \
            --parser-v1 \
            --var "docker_image=${REGISTRY}/${IMAGE_NAME}@${WEB_IMAGE_DIGEST}" \
            --var "enabled=${WEB_ENABLED}" \
            --var "traefik_subdomain=${WEB_SUBDOMAIN}"

  deploy-listing-check-runner:
    name: Register listing-check runner
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      IMAGE_NAME: ${{ github.repository_owner }}/cv-listing-check-runner
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nomad Pack
        run: |
          version=0.3.0
          archive="nomad-pack_${version}_linux_amd64.zip"
          curl -fsSL "https://releases.hashicorp.com/nomad-pack/${version}/${archive}" -o "$archive"
          unzip -q "$archive" -d /tmp/nomad-pack
          sudo install /tmp/nomad-pack/nomad-pack /usr/local/bin/nomad-pack

      - name: Register periodic listing-check job
        env:
          NOMAD_ADDR: ${{ secrets.NOMAD_ADDR }}
          NOMAD_TOKEN: ${{ secrets.NOMAD_TOKEN }}
          RUNNER_ENABLED: "true"
          RUNNER_IMAGE_DIGEST: ${{ inputs.listing_check_runner_image_digest }}
        run: |
          nomad-pack run nomad/packs/application-registry-listing-check-runner \
            --parser-v1 \
            --var "docker_image=${REGISTRY}/${IMAGE_NAME}@${RUNNER_IMAGE_DIGEST}" \
            --var "enabled=${RUNNER_ENABLED}"

  deploy-self-hosted-pdf:
    name: Register PDF event worker
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      IMAGE_NAME: ${{ github.repository_owner }}/application-registry-pdf-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nomad Pack
        run: |
          version=0.3.0
          archive="nomad-pack_${version}_linux_amd64.zip"
          curl -fsSL "https://releases.hashicorp.com/nomad-pack/${version}/${archive}" -o "$archive"
          unzip -q "$archive" -d /tmp/nomad-pack
          sudo install /tmp/nomad-pack/nomad-pack /usr/local/bin/nomad-pack

      - name: Register PDF worker service
        env:
          NOMAD_ADDR: ${{ secrets.NOMAD_ADDR }}
          NOMAD_TOKEN: ${{ secrets.NOMAD_TOKEN }}
          WORKER_ENABLED: "true"
          WORKER_IMAGE_DIGEST: ${{ inputs.pdf_worker_image_digest }}
        run: |
          nomad-pack run nomad/packs/application-registry-pdf-worker \
            --parser-v1 \
            --var "docker_image=${REGISTRY}/${IMAGE_NAME}@${WORKER_IMAGE_DIGEST}" \
            --var "enabled=${WORKER_ENABLED}"
