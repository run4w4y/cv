name: Deploy Analytics

permissions:
  actions: read
  contents: read
  id-token: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: analytics-production
  cancel-in-progress: false

env:
  ASTRO_TELEMETRY_DISABLED: "1"
  INFISICAL_ENV: ${{ vars.INFISICAL_ENV || 'prod' }}
  INFISICAL_HOST: ${{ vars.INFISICAL_HOST || 'https://app.infisical.com' }}

jobs:
  detect-affected:
    name: Detect affected analytics project
    runs-on: ubuntu-latest
    outputs:
      analytics_affected: ${{ steps.affected.outputs.analytics_affected }}
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Derive Nx affected SHAs
        if: ${{ !env.ACT && github.event_name == 'push' }}
        uses: nrwl/nx-set-shas@v5

      - name: Set up workspace runtime
        uses: ./.github/actions/setup-runtime

      - name: Detect affected analytics project
        id: affected
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || -n "${ACT:-}" ]]; then
            echo "analytics_affected=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          projects="$(./node_modules/.bin/nx show projects --affected)"
          if grep -qx 'analytics-connector' <<<"$projects"; then
            echo "analytics_affected=true" >> "$GITHUB_OUTPUT"
          else
            echo "analytics_affected=false" >> "$GITHUB_OUTPUT"
          fi

  build-analytics-production:
    name: Build production analytics Worker
    needs: detect-affected
    if: ${{ needs.detect-affected.outputs.analytics_affected == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Fetch Infisical secrets
        if: ${{ !env.ACT }}
        uses: ./.github/actions/fetch-infisical
        with:
          identity-id: ${{ secrets.INFISICAL_IDENTITY_ID }}
          project-slug: ${{ secrets.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ env.INFISICAL_ENV }}
          host: ${{ env.INFISICAL_HOST }}

      - name: Set up workspace runtime
        uses: ./.github/actions/setup-runtime

      - name: Validate production analytics configuration
        run: |
          missing=()
          for name in \
            CLOUDFLARE_ACCOUNT_ID \
            CLOUDFLARE_ANALYTICS_API_TOKEN \
            CLOUDFLARE_API_TOKEN \
            CLOUDFLARE_ZONE_ID \
            CV_WEB_HOST \
            GRAFANA_CONNECTOR_TOKEN \
            PRIVATE_CONTENT_AUDIENCE_KEY
          do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf '::error title=Missing production analytics configuration::Missing: %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Build analytics Worker
        run: ./node_modules/.bin/nx run analytics-connector:build

      - name: Upload analytics Worker artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: analytics-connector-dist
          path: apps/analytics-connector/dist
          if-no-files-found: error
          retention-days: 7

  deploy-analytics-worker:
    name: Deploy analytics Worker
    needs:
      - detect-affected
      - build-analytics-production
    if: ${{ needs.detect-affected.outputs.analytics_affected == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      deployments: write
      id-token: write
    steps:
      - name: Checkout
        if: ${{ !env.ACT }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Fetch Infisical secrets
        if: ${{ !env.ACT }}
        uses: ./.github/actions/fetch-infisical
        with:
          identity-id: ${{ secrets.INFISICAL_IDENTITY_ID }}
          project-slug: ${{ secrets.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ env.INFISICAL_ENV }}
          host: ${{ env.INFISICAL_HOST }}

      - name: Set up workspace runtime
        if: ${{ !env.ACT }}
        uses: ./.github/actions/setup-runtime

      - name: Download analytics Worker artifact
        if: ${{ !env.ACT }}
        uses: actions/download-artifact@v4
        with:
          name: analytics-connector-dist
          path: apps/analytics-connector/dist

      - name: Generate analytics connector Wrangler config
        if: ${{ !env.ACT }}
        env:
          ANALYTICS_CONNECTOR_COMPATIBILITY_DATE: ${{ vars.ANALYTICS_CONNECTOR_COMPATIBILITY_DATE }}
          ANALYTICS_CONNECTOR_WORKER_NAME: ${{ vars.ANALYTICS_CONNECTOR_WORKER_NAME || 'cv-analytics-connector' }}
        run: bun apps/analytics-connector/scripts/write-wrangler-config.ts apps/analytics-connector/wrangler.deploy.jsonc

      - name: Deploy analytics connector Worker
        if: ${{ !env.ACT }}
        run: |
          printf '%s' "$CLOUDFLARE_ANALYTICS_API_TOKEN" \
            | bunx wrangler secret put CLOUDFLARE_ANALYTICS_API_TOKEN --config wrangler.deploy.jsonc
          printf '%s' "$GRAFANA_CONNECTOR_TOKEN" \
            | bunx wrangler secret put GRAFANA_CONNECTOR_TOKEN --config wrangler.deploy.jsonc
          printf '%s' "$PRIVATE_CONTENT_AUDIENCE_KEY" \
            | bunx wrangler secret put PRIVATE_CONTENT_AUDIENCE_KEY --config wrangler.deploy.jsonc
          bunx wrangler deploy --config wrangler.deploy.jsonc
        working-directory: apps/analytics-connector
