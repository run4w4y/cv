name: Publish CV Image

permissions:
  contents: read
  packages: write

on:
  workflow_call:
    outputs:
      image_digest:
        description: Immutable CV web image digest.
        value: ${{ jobs.publish.outputs.digest }}

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Publish CV web image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.image.outputs.digest }}
    env:
      IMAGE_NAME: ${{ github.repository_owner }}/cv-web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push immutable CV image
        id: image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/cv/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
