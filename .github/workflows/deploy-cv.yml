name: Deploy CV

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      image_digest:
        description: Immutable CV web image digest.
        required: true
        type: string

concurrency:
  group: cv-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  deploy-cv-web:
    name: Register CV web service
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      IMAGE_NAME: ${{ github.repository_owner }}/cv-web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nomad Pack
        run: |
          version=0.3.0
          archive="nomad-pack_${version}_linux_amd64.zip"
          curl -fsSL "https://releases.hashicorp.com/nomad-pack/${version}/${archive}" -o "$archive"
          unzip -q "$archive" -d /tmp/nomad-pack
          sudo install /tmp/nomad-pack/nomad-pack /usr/local/bin/nomad-pack

      - name: Register CV web service
        env:
          CV_IMAGE_DIGEST: ${{ inputs.image_digest }}
          NOMAD_ADDR: ${{ secrets.NOMAD_ADDR }}
          NOMAD_TOKEN: ${{ secrets.NOMAD_TOKEN }}
        run: |
          nomad-pack run nomad/packs/cv-web \
            --parser-v1 \
            --var "docker_image=${REGISTRY}/${IMAGE_NAME}@${CV_IMAGE_DIGEST}" \
            --var "deployment_id=${GITHUB_SHA}" \
            --var "enabled=true"
