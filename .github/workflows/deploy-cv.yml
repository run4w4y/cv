name: Deploy CV

permissions:
  actions: read
  contents: read
  id-token: write

on:
  workflow_call:

concurrency:
  group: cv-production
  cancel-in-progress: false

env:
  INFISICAL_ENV: ${{ vars.INFISICAL_ENV || 'prod' }}
  INFISICAL_HOST: ${{ vars.INFISICAL_HOST || 'https://app.infisical.com' }}

jobs:
  deploy-cv-worker:
    name: Build and deploy public CV Worker
    runs-on: ubuntu-latest
    environment: production
    permissions:
      actions: read
      contents: read
      deployments: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Fetch Infisical deployment values
        if: ${{ !env.ACT }}
        uses: ./.github/actions/fetch-infisical
        with:
          identity-id: ${{ secrets.INFISICAL_IDENTITY_ID }}
          project-slug: ${{ secrets.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ env.INFISICAL_ENV }}
          host: ${{ env.INFISICAL_HOST }}

      - name: Set up workspace runtime
        uses: ./.github/actions/setup-runtime

      - name: Resolve public CV Worker deployment values
        env:
          CONFIGURED_CV_PUBLIC_RESOLVER_URL: ${{ vars.CV_PUBLIC_RESOLVER_URL }}
          CONFIGURED_CV_PUBLIC_WORKER_NAME: ${{ vars.CV_PUBLIC_WORKER_NAME }}
        run: |
          worker_name="${CONFIGURED_CV_PUBLIC_WORKER_NAME:-${CV_PUBLIC_WORKER_NAME:-cv-public}}"
          resolver_url="${CONFIGURED_CV_PUBLIC_RESOLVER_URL:-${CV_PUBLIC_RESOLVER_URL:-}}"

          {
            printf 'CV_PUBLIC_WORKER_NAME=%s\n' "$worker_name"
            if [[ -n "$resolver_url" ]]; then
              printf 'CV_PUBLIC_RESOLVER_URL=%s\n' "$resolver_url"
            fi
          } >> "$GITHUB_ENV"

      - name: Validate production CV Worker configuration
        if: ${{ !env.ACT }}
        run: |
          missing=()
          for name in \
            CLOUDFLARE_ACCOUNT_ID \
            CLOUDFLARE_API_TOKEN \
            CV_PUBLIC_RESOLVER_URL \
            CV_PUBLIC_WORKER_NAME \
            CV_REVALIDATION_SECRET
          do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf '::error title=Missing production CV Worker configuration::Missing: %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Build public CV Worker
        run: ./node_modules/.bin/nx run cv:build --skip-nx-cache

      - name: Generate production Wrangler config
        env:
          CV_PUBLIC_COMPATIBILITY_DATE: ${{ vars.CV_PUBLIC_COMPATIBILITY_DATE }}
        run: >-
          bun apps/cv/scripts/write-wrangler-config.ts
          apps/cv/wrangler.deploy.jsonc

      - name: Validate deployable Worker artifact
        run: >-
          bunx wrangler deploy --dry-run
          --config apps/cv/wrangler.deploy.jsonc
          --outdir apps/cv/.open-next/deploy-check

      - name: Deploy public CV Worker
        if: ${{ !env.ACT }}
        run: bun scripts/deploy.ts wrangler.deploy.jsonc
        working-directory: apps/cv
