name: CI

permissions:
  actions: read
  contents: read

on:
  pull_request:
  push:
  repository_dispatch:
    types:
      - content-updated
  workflow_dispatch:
    inputs:
      content_ref:
        description: Git ref or SHA from run4w4y/cv-content.
        required: false
        type: string
      deploy_target:
        default: all
        description: Production target to deploy after the quality gates pass.
        options:
          - all
          - cv
          - analytics
          - registry
          - none
        required: true
        type: choice

env:
  ASTRO_TELEMETRY_DISABLED: "1"
  CONTENT_ID_SALT: cv-ci-fixture-salt
  CONTENT_ROOT: ${{ github.workspace }}/fixtures/cv-content-e2e
  CV_WEB_BASE_URL: https://cv.example.invalid
  PRIVATE_CONTENT_AUDIENCE_KEY: cv-ci-fixture-audience-key
  PRIVATE_CONTENT_ROOT_KEY: base64url:AQIDBAUGBwgJCgsMDQ4PEBESExQVFhcYGRobHB0eHyA
  PUBLIC_CV_FULL_ACCESS_EMAIL: full-access.fixture@example.invalid
  PUBLIC_CV_WEB_BASE_URL: https://cv.example.invalid

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Derive Nx affected SHAs
        if: ${{ !env.ACT && (github.event_name == 'push' || github.event_name == 'pull_request') }}
        uses: nrwl/nx-set-shas@v5

      - name: Set up workspace runtime
        uses: ./.github/actions/setup-runtime

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4.0.1

      - name: Validate GitHub Actions and embedded shell scripts
        run: |
          command -v shellcheck
          go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          shellcheck --shell=bash --exclude=SC2154 .envrc terraform/live/prod/.envrc

      - name: Validate Terraform modules
        run: |
          terraform fmt -check -recursive terraform/modules
          validation_root="$(mktemp -d)"
          rsync -a --exclude=.terraform --exclude=.terragrunt-cache terraform/modules/ "$validation_root/modules/"
          for module in "$validation_root"/modules/*; do
            terraform -chdir="$module" init -backend=false -input=false
            terraform -chdir="$module" validate
          done

      - name: Check formatting, imports, and lint rules
        run: bun run quality:biome

      - name: Run typechecks and unit tests
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ -n "${ACT:-}" || "$EVENT_NAME" == "workflow_dispatch" || "$EVENT_NAME" == "repository_dispatch" ]]; then
            ./node_modules/.bin/nx run-many -t typecheck test:unit --parallel=6
          else
            ./node_modules/.bin/nx affected -t typecheck test:unit --parallel=6
          fi

  cv-build:
    name: Build CV app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Set up workspace runtime
        uses: ./.github/actions/setup-runtime

      - name: Build fixture CV app
        run: ./node_modules/.bin/nx run cv:build --skip-nx-cache

  analytics-build:
    name: Build analytics Worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Set up workspace runtime
        uses: ./.github/actions/setup-runtime

      - name: Build analytics Worker
        run: ./node_modules/.bin/nx run analytics-connector:build

  application-registry-build:
    name: Build application registry Worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Set up workspace runtime
        uses: ./.github/actions/setup-runtime

      - name: Verify application registry migration drift
        run: ./node_modules/.bin/nx run application-registry-entity:migrations:check --skip-nx-cache

      - name: Build application registry Worker
        run: ./node_modules/.bin/nx run application-registry-api:build --skip-nx-cache

  application-registry-tests:
    name: Test application registry Worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Set up workspace runtime
        uses: ./.github/actions/setup-runtime

      - name: Run registry CRUD integration tests
        run: ./node_modules/.bin/nx run application-registry-crud:test:integration --skip-nx-cache

      - name: Run registry service integration tests
        run: ./node_modules/.bin/nx run application-registry-service:test:integration --skip-nx-cache

      - name: Run registry API integration tests
        run: ./node_modules/.bin/nx run application-registry-api:test:integration --skip-nx-cache

      - name: Run built Worker end-to-end tests
        run: ./node_modules/.bin/nx run application-registry-api:test:e2e --skip-nx-cache

  cv-e2e:
    name: Run CV e2e tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Set up workspace runtime
        uses: ./.github/actions/setup-runtime
        with:
          install-playwright: "true"

      - name: Run browser e2e tests
        run: ./node_modules/.bin/nx run cv:test:e2e

  deploy-cv:
    name: Deploy production CV
    needs:
      - quality
      - cv-build
      - cv-e2e
    if: >-
      ${{
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        github.event_name == 'repository_dispatch' ||
        (github.event_name == 'workflow_dispatch' &&
          (inputs.deploy_target == 'all' || inputs.deploy_target == 'cv'))
      }}
    permissions:
      actions: read
      contents: write
      deployments: write
      id-token: write
    secrets: inherit
    uses: ./.github/workflows/deploy-cv.yml
    with:
      content_ref: ${{ github.event.client_payload.content_ref || inputs.content_ref || 'main' }}

  deploy-analytics:
    name: Deploy production analytics
    needs:
      - quality
      - analytics-build
    if: >-
      ${{
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' &&
          (inputs.deploy_target == 'all' || inputs.deploy_target == 'analytics'))
      }}
    permissions:
      actions: read
      contents: read
      deployments: write
      id-token: write
    secrets: inherit
    uses: ./.github/workflows/deploy-analytics.yml

  deploy-application-registry:
    name: Deploy production application registry
    needs:
      - quality
      - application-registry-build
      - application-registry-tests
    if: >-
      ${{
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' &&
          (inputs.deploy_target == 'all' || inputs.deploy_target == 'registry'))
      }}
    permissions:
      actions: read
      contents: read
      deployments: write
      id-token: write
    secrets: inherit
    uses: ./.github/workflows/deploy-application-registry.yml
