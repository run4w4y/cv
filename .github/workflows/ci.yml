name: CI

permissions:
  actions: read
  contents: read

on:
  pull_request:
  push:
  workflow_dispatch:
    inputs:
      deploy_target:
        default: all
        description: Production target to deploy after the quality gates pass.
        options:
          - all
          - cv
          - registry
          - none
        required: true
        type: choice

env:
  ASTRO_TELEMETRY_DISABLED: "1"

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Derive Nx affected SHAs
        if: ${{ !env.ACT && (github.event_name == 'push' || github.event_name == 'pull_request') }}
        uses: nrwl/nx-set-shas@v5

      - name: Set up workspace runtime
        uses: ./.github/actions/setup-runtime

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4.0.1

      - name: Validate GitHub Actions and embedded shell scripts
        run: |
          command -v shellcheck
          go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          shellcheck --shell=bash --exclude=SC2154 .envrc terraform/live/prod/.envrc

      - name: Validate Terraform modules
        run: |
          terraform fmt -check -recursive terraform/modules
          validation_root="$(mktemp -d)"
          rsync -a --exclude=.terraform --exclude=.terragrunt-cache terraform/modules/ "$validation_root/modules/"
          for module in "$validation_root"/modules/*; do
            terraform -chdir="$module" init -backend=false -input=false
            terraform -chdir="$module" validate
          done

      - name: Check formatting, imports, and lint rules
        run: bun run quality:biome

      - name: Run typechecks and unit tests
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ -n "${ACT:-}" || "$EVENT_NAME" == "workflow_dispatch" ]]; then
            ./node_modules/.bin/nx run-many -t typecheck test:unit --parallel=6
          else
            ./node_modules/.bin/nx affected -t typecheck test:unit --parallel=6
          fi

  cv-build:
    name: Build CV app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Set up workspace runtime
        uses: ./.github/actions/setup-runtime

      - name: Build public CV Worker
        run: ./node_modules/.bin/nx run cv:build --skip-nx-cache

  application-registry-build:
    name: Build application registry services
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Set up workspace runtime
        uses: ./.github/actions/setup-runtime

      - name: Verify application registry migration drift
        run: ./node_modules/.bin/nx run application-registry-entity:migrations:check --skip-nx-cache

      - name: Build self-hosted application registry API
        run: ./node_modules/.bin/nx run application-registry-api:build --skip-nx-cache

      - name: Build listing-check runner
        run: ./node_modules/.bin/nx run application-registry-listing-check-runner:build --skip-nx-cache

      - name: Build PDF event worker
        run: ./node_modules/.bin/nx run application-registry-pdf-worker:build --skip-nx-cache

  application-registry-tests:
    name: Test application registry services
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Set up workspace runtime
        uses: ./.github/actions/setup-runtime

      - name: Run registry event transport integration tests
        run: ./node_modules/.bin/nx run application-registry-events-nats:test:integration --skip-nx-cache

      - name: Run registry API system tests
        run: ./node_modules/.bin/nx run application-registry-api:test:integration --skip-nx-cache

      - name: Run registry CRUD integration tests
        run: ./node_modules/.bin/nx run application-registry-crud:test:integration --skip-nx-cache

      - name: Run registry D1-to-PostgreSQL migration integration tests
        run: ./node_modules/.bin/nx run application-registry-migration:test:integration --skip-nx-cache

      - name: Run registry service integration tests
        run: ./node_modules/.bin/nx run application-registry-service:test:integration --skip-nx-cache

  cv-e2e:
    name: Test CV app in Chromium
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Set up workspace runtime
        uses: ./.github/actions/setup-runtime
        with:
          install-playwright: "true"

      - name: Run CV browser end-to-end tests
        run: ./node_modules/.bin/nx run cv:test:e2e --skip-nx-cache

  deploy-cv:
    name: Deploy production CV
    needs:
      - quality
      - cv-build
      - cv-e2e
      - deploy-application-registry
    if: >-
      ${{
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' &&
          github.ref == 'refs/heads/main' &&
          (inputs.deploy_target == 'all' || inputs.deploy_target == 'cv'))
      }}
    permissions:
      actions: read
      contents: read
      deployments: write
      id-token: write
    secrets: inherit
    uses: ./.github/workflows/deploy-cv.yml

  deploy-application-registry:
    name: Deploy production application registry
    needs:
      - quality
      - application-registry-build
      - application-registry-tests
    if: >-
      ${{
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' &&
          github.ref == 'refs/heads/main' &&
          (inputs.deploy_target == 'all' ||
            inputs.deploy_target == 'cv' ||
            inputs.deploy_target == 'registry'))
      }}
    permissions:
      actions: read
      contents: read
      deployments: write
      id-token: write
    secrets: inherit
    uses: ./.github/workflows/deploy-application-registry.yml
