name: Set up workspace runtime
description: Set up Node.js, Bun, workspace dependencies, and optional Playwright browsers.

inputs:
  bun-version:
    description: Bun version to install.
    default: 1.3.13
    required: false
  install-playwright:
    description: Install Playwright Chromium and OS dependencies.
    default: "false"
    required: false
  node-version:
    description: Node.js version to install.
    default: "22"
    required: false

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile

    - name: Install Playwright Chromium
      if: ${{ inputs.install-playwright == 'true' }}
      shell: bash
      run: bunx playwright install --with-deps chromium
