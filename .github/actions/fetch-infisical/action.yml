name: Fetch Infisical secrets
description: Validate Infisical OIDC inputs and export secrets into the job environment.

inputs:
  env-slug:
    description: Infisical environment slug.
    default: prod
    required: false
  host:
    description: Infisical application host.
    default: https://app.infisical.com
    required: false
  identity-id:
    description: Infisical machine identity id configured for GitHub OIDC.
    required: true
  project-slug:
    description: Infisical project slug.
    required: true
  recursive:
    description: Whether to recursively export secrets below the secret path.
    default: "true"
    required: false
  secret-path:
    description: Infisical secret path to export.
    default: /cv
    required: false

runs:
  using: composite
  steps:
    - name: Validate Infisical OIDC configuration
      shell: bash
      env:
        INFISICAL_IDENTITY_ID: ${{ inputs.identity-id }}
        INFISICAL_PROJECT_SLUG: ${{ inputs.project-slug }}
      run: |
        missing=()
        for name in INFISICAL_IDENTITY_ID INFISICAL_PROJECT_SLUG; do
          if [[ -z "${!name:-}" ]]; then
            missing+=("$name")
          fi
        done

        if (( ${#missing[@]} > 0 )); then
          printf '::error title=Missing Infisical GitHub secrets::Set these GitHub repository or production environment secrets: %s\n' "${missing[*]}"
          exit 1
        fi

    - name: Fetch Infisical secrets
      uses: Infisical/secrets-action@v1.0.16
      with:
        method: oidc
        identity-id: ${{ inputs.identity-id }}
        domain: ${{ inputs.host }}
        env-slug: ${{ inputs.env-slug }}
        project-slug: ${{ inputs.project-slug }}
        secret-path: ${{ inputs.secret-path }}
        recursive: ${{ inputs.recursive }}
